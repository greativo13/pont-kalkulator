<!DOCTYPE html>
<html lang="hu" data-theme="soft">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VB App</title>
  <style>
    /* ── TÉMÁK ── */
    :root {
      --bg: #09090b; --surface: #18181b; --card: #18181b; --card-hover: #1f1f23;
      --border: #27272a; --text: #fafafa; --text-muted: #71717a; --text-sub: #52525b;
      --accent: #818cf8; --accent-hover: #a5b4fc; --accent-dim: #818cf815;
      --danger: #f87171; --danger-dim: #f871711a; --success: #4ade80;
      --input-bg: #09090b; --bar-bg: #27272a; --radius: 10px;
    }
    [data-theme="soft"] {
      --bg: #0f172a; --surface: #1e293b; --card: #1e293b; --card-hover: #263548;
      --border: #334155; --text: #e2e8f0; --text-muted: #94a3b8; --text-sub: #64748b;
      --accent: #818cf8; --accent-hover: #a5b4fc; --accent-dim: #818cf818;
      --danger: #f87171; --danger-dim: #f871711a; --success: #4ade80;
      --input-bg: #0f172a; --bar-bg: #334155;
    }
    [data-theme="light"] {
      --bg: #f1f5f9; --surface: #ffffff; --card: #ffffff; --card-hover: #f8fafc;
      --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; --text-sub: #94a3b8;
      --accent: #6366f1; --accent-hover: #4f46e5; --accent-dim: #6366f112;
      --danger: #ef4444; --danger-dim: #ef444415; --success: #22c55e;
      --input-bg: #f8fafc; --bar-bg: #e2e8f0;
    }

    /* ── ALAP ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── NAV ── */
    .nav {
      display: flex; align-items: center; background: var(--surface);
      border-bottom: 1px solid var(--border); padding: 0 16px;
      flex-shrink: 0; height: 52px; gap: 4px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 12px; white-space: nowrap; }
    .nav-tabs { display: flex; gap: 4px; flex: 1; }
    .nav-tab { padding: 6px 14px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; }
    .nav-tab:hover { background: var(--accent-dim); color: var(--text); }
    .nav-tab.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .theme-btn { margin-left: auto; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .theme-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    /* ── SECTION VÁLTÁS ── */
    .app-section { display: none; flex: 1; }
    .app-section.active { display: block; }

    /* ── KÖZÖS ELEMEK ── */
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 20px 16px 100px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    input[type="number"], input[type="date"], input[type="text"] {
      padding: 7px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 7px;
      outline: none; background: var(--input-bg); color: var(--text); transition: border-color 0.15s;
    }
    input[type="number"]:focus, input[type="date"]:focus, input[type="text"]:focus { border-color: var(--accent); }
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator,
    [data-theme="soft"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
    .history-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .history-row:last-child { border-bottom: none; }
    .empty { text-align: center; color: var(--text-sub); padding: 32px; font-size: 0.85rem; }
    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #fff; padding: 9px 20px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; z-index: 999; transition: opacity 0.4s; pointer-events: none; opacity: 0; }

    /* ── PONTGYŰJTŐ ── */
    #pg header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    #pg header h1 { font-size: 1rem; font-weight: 700; }
    #pg header span { font-size: 0.8rem; color: var(--text-muted); }
    .pg-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; gap: 2px; }
    .pg-tab { padding: 10px 14px; font-size: 0.82rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
    .pg-tab:hover { color: var(--text); }
    .pg-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .pg-page { display: none; }
    .pg-page.active { display: block; }
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .sc-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .sc-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .sc-value.big { font-size: 2rem; }
    .category-list { display: flex; flex-direction: column; gap: 6px; }
    .category-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; }
    .category-item:hover { background: var(--card-hover); }
    .category-item.dragging { opacity: 0.4; }
    .category-item.drag-over { box-shadow: 0 0 0 2px var(--accent); }
    .drag-handle { cursor: grab; color: var(--text-sub); font-size: 1.1rem; padding: 0 8px 0 0; display: none; user-select: none; touch-action: none; }
    .edit-mode .drag-handle { display: block; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-pts { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .pts-edit-wrap { display: none; align-items: center; gap: 4px; margin-top: 4px; }
    .edit-mode .pts-edit-wrap { display: flex; }
    .edit-mode .cat-pts { display: none; }
    .color-palette { display: none; gap: 5px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
    .edit-mode .color-palette { display: flex; }
    .color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; flex-shrink: 0; }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }
    .color-swatch.none { background: var(--border); position: relative; }
    .color-swatch.none::after { content: '×'; color: var(--text-muted); font-size: 12px; font-weight: 700; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .cat-name-static { display: block; }
    .cat-name-input { display: none; width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; font-weight: 600; padding: 3px 7px; }
    .edit-mode .cat-name-static { display: none; }
    .edit-mode .cat-name-input { display: block; }
    .cat-name-input:focus { outline: none; border-color: var(--accent); }
    .pts-input { width: 52px; background: var(--input-bg); border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-size: 0.82rem; padding: 3px 6px; text-align: center; }
    .pts-input:focus { outline: none; }
    .cat-controls { display: flex; align-items: center; gap: 8px; }
    .btn-minus, .btn-plus { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.15s; }
    .btn-plus { background: var(--accent); color: #fff; }
    .btn-plus:hover { background: var(--accent-hover); }
    .btn-plus:active { transform: scale(0.88); }
    .btn-minus { background: var(--border); color: var(--text-muted); }
    .btn-minus:hover { color: var(--text); }
    .btn-minus:active { transform: scale(0.88); }
    .cat-count { min-width: 26px; text-align: center; font-size: 1rem; font-weight: 700; }
    .cat-earned { min-width: 42px; text-align: right; font-size: 0.85rem; color: var(--accent); font-weight: 600; }
    .edit-toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .edit-toggle-btn { background: var(--border); color: var(--text-muted); border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: all 0.15s; }
    .edit-toggle-btn:hover { color: var(--text); }
    .edit-toggle-btn.active { background: var(--accent); color: #fff; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-day { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .history-day-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; transition: background 0.15s; }
    .history-day-header:hover { background: var(--card-hover); }
    .history-day-header .hd-date { font-weight: 600; font-size: 0.88rem; }
    .history-day-header .hd-total { color: var(--accent); font-weight: 700; font-size: 0.88rem; }
    .history-day-body { padding: 8px 16px 12px; display: none; border-top: 1px solid var(--border); }
    .history-day-body.open { display: block; }
    .clear-btn { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 0.82rem; margin-top: 16px; width: 100%; transition: background 0.15s; }
    .clear-btn:hover { background: var(--danger); color: #fff; }
    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: none; align-items: center; gap: 10px; z-index: 50; }
    .save-bar.visible { display: flex; }
    .save-bar .today-pts { font-size: 0.9rem; color: var(--text-muted); flex: 1; min-width: 80px; }
    .save-bar .today-pts span { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
    .save-date { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 0.82rem; outline: none; transition: border-color 0.15s; }
    .save-date:focus { border-color: var(--accent); }
    .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; white-space: nowrap; }
    .save-btn:hover { background: var(--accent-hover); }
    .date-range-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .dr-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
    .dr-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .dr-row input[type="date"] { flex: 1; min-width: 120px; }
    .dr-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 0.82rem; font-weight: 600; white-space: nowrap; transition: background 0.15s; }
    .dr-btn:hover { background: var(--accent-hover); }
    .dr-result { margin-top: 14px; display: none; }
    .dr-total { font-size: 1.8rem; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 4px; }
    .dr-days { font-size: 0.72rem; color: var(--text-sub); text-align: center; margin-bottom: 10px; }
    .section-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }

    /* ── KALKULÁTOR ── */
    .pk-h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .settings-toggle { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; margin-bottom: 14px; letter-spacing: 0.05em; text-transform: uppercase; }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .setting-item { display: flex; flex-direction: column; gap: 4px; }
    .setting-item label { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .setting-item input[type="number"] { width: 100%; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; }
    .target-info { font-size: 11px; color: var(--text-sub); margin-top: 10px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    @media (max-width: 500px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; text-align: center; }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-value { font-size: 1.5rem; font-weight: 700; }
    .metric-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .day-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .day-label { font-size: 12px; color: var(--text-muted); min-width: 48px; flex-shrink: 0; }
    .day-date { width: 148px; flex-shrink: 0; }
    .day-num { width: 80px; flex-shrink: 0; }
    .bar-bg { flex: 1; background: var(--bar-bg); border-radius: 4px; height: 6px; overflow: hidden; min-width: 0; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.35s; }
    .day-pt { font-size: 12px; color: var(--text-muted); min-width: 52px; text-align: right; flex-shrink: 0; }
    .reset-btn { padding: 9px 24px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: transparent; cursor: pointer; color: var(--danger); transition: background 0.15s, border-color 0.15s; }
    .reset-btn:hover { background: var(--danger-dim); border-color: var(--danger); }
    .gauge-pct { font-size: 2.5rem; font-weight: 700; line-height: 1; }
    .gauge-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  </style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <span class="nav-title">VB</span>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchApp('pg', this)">⭐ Pontgyűjtő</div>
    <div class="nav-tab" onclick="switchApp('pk', this)">📊 Kalkulátor</div>
  </div>
  <button class="theme-btn" onclick="cycleTheme()" id="themeBtn">🌓</button>
</div>

<!-- ══════════════ PONTGYŰJTŐ ══════════════ -->
<div id="pg" class="app-section active">
  <header>
    <h1>⭐ Pontgyűjtő</h1>
    <span id="pg-today-date"></span>
  </header>
  <div class="pg-tabs">
    <div class="pg-tab active" onclick="pgShowTab('rogzit', this)">Rögzítés</div>
    <div class="pg-tab" onclick="pgShowTab('osszesito', this)">Összesítő</div>
    <div class="pg-tab" onclick="pgShowTab('elozmenyek', this)">Előzmények</div>
  </div>

  <div id="pg-rogzit" class="pg-page active">
    <div class="page-wrap" style="padding-top:12px;">
      <div class="edit-toggle-bar">
        <button class="edit-toggle-btn" id="editToggleBtn" onclick="pgToggleEdit()">✏️ Szerkesztés</button>
      </div>
      <div class="category-list" id="categoryList"></div>
    </div>
  </div>

  <div id="pg-osszesito" class="pg-page">
    <div class="page-wrap" style="padding-top:12px;">
      <div class="summary-cards">
        <div class="card"><div class="sc-label">Ma</div><div class="sc-value big" id="s-today">0</div></div>
        <div class="card"><div class="sc-label">Ezen a héten</div><div class="sc-value" id="s-week">0</div></div>
        <div class="card"><div class="sc-label">Ebben a hónapban</div><div class="sc-value" id="s-month">0</div></div>
      </div>
      <div class="date-range-box">
        <div class="dr-label">Egyéni időszak</div>
        <div class="dr-row">
          <input type="date" id="rangeFrom">
          <span style="color:var(--text-sub);font-size:0.82rem;">–</span>
          <input type="date" id="rangeTo">
          <button class="dr-btn" onclick="pgCalcRange()">Mutat</button>
        </div>
        <div class="dr-result" id="drResult">
          <div class="dr-total" id="drTotal">0</div>
          <div class="dr-days" id="drDays"></div>
          <div id="drBreakdown"></div>
        </div>
      </div>
      <div class="section-box">
        <div class="section-title">Mai bontás</div>
        <div id="todayBreakdown"></div>
      </div>
    </div>
  </div>

  <div id="pg-elozmenyek" class="pg-page">
    <div class="page-wrap" style="padding-top:12px;">
      <div class="history-list" id="historyList"></div>
      <button class="clear-btn" onclick="pgClearAll()">🗑 Összes adat törlése</button>
    </div>
  </div>
</div>

<!-- ══════════════ KALKULÁTOR ══════════════ -->
<div id="pk" class="app-section">
  <div class="page-wrap">
    <div class="pk-h1">📊 Etup Pont Kalkulátor</div>
    <div class="card">
      <div class="settings-toggle" onclick="pkToggleSettings()">
        <span id="pk-chevron">▾</span> Beállítások
      </div>
      <div id="pk-settings">
        <div class="settings-grid">
          <div class="setting-item"><label>Etup hossza (nap)</label><input type="number" id="etup-days" min="1" value="7" step="1" oninput="pkRebuildDays()"></div>
          <div class="setting-item"><label>Eltelt napok</label><input type="number" id="elapsed-days" min="1" value="1" step="1" oninput="pkRecalc()"></div>
          <div class="setting-item"><label><span class="dot" style="background:#65a30d"></span> 80% – pont/nap</label><input type="number" id="rate-80" min="0.5" value="103" step="0.5" oninput="pkRecalc()"></div>
          <div class="setting-item"><label><span class="dot" style="background:#0d9488"></span> 100% – pont/nap</label><input type="number" id="rate-100" min="0.5" value="130" step="0.5" oninput="pkRecalc()"></div>
          <div class="setting-item"><label><span class="dot" style="background:#ea580c"></span> 120% – pont/nap</label><input type="number" id="rate-120" min="0.5" value="156" step="0.5" oninput="pkRecalc()"></div>
        </div>
        <div class="target-info" id="pk-target-info"></div>
      </div>
    </div>
    <div class="metrics-grid" id="pk-summary-cards"></div>
    <div class="card"><div class="section-title">Összesített teljesítmény</div><div id="pk-gauge"></div></div>
    <div class="card"><div class="section-title">Napi bevitel</div><div id="pk-days-list"></div></div>
    <div style="text-align:center; margin-bottom:1rem;">
      <button onclick="pkReset()" class="reset-btn">🔄 Új etup indítása</button>
    </div>
  </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar visible" id="saveBar">
  <div class="today-pts">Pontok: <span id="livePts">0</span></div>
  <input type="date" class="save-date" id="saveDate" onchange="pgOnDateChange()">
  <button class="save-btn" onclick="pgSaveDay()">Mentés ✓</button>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// TÉMA
// ══════════════════════════════════════════
const THEMES = ['dark','soft','light'];
const THEME_ICONS = { dark:'🌑', soft:'🌓', light:'☀️' };
let currentTheme = localStorage.getItem('vb-theme') || 'soft';

function applyTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = THEME_ICONS[t];
  localStorage.setItem('vb-theme', t);
}
function cycleTheme() {
  const next = THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length];
  applyTheme(next);
}
applyTheme(currentTheme);

// ══════════════════════════════════════════
// APP VÁLTÁS
// ══════════════════════════════════════════
function switchApp(id, tab) {
  document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tab.classList.add('active');
  document.getElementById('saveBar').className = 'save-bar' + (id === 'pg' ? ' visible' : '');
}

// ══════════════════════════════════════════
// KÖZÖS SEGÉDFÜGGVÉNY
// ══════════════════════════════════════════
function fmt(n) { const v = parseFloat(n); return Number.isInteger(v) ? v : v.toFixed(1); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 1800);
}

// ══════════════════════════════════════════
// PONTGYŰJTŐ
// ══════════════════════════════════════════
{
  const DEFAULT_CATEGORIES = [
    { id: '4ec',      name: '4EC',               pts: 2   },
    { id: 'notak52',  name: 'NO TAK 5+2',         pts: 2   },
    { id: 'tak52',    name: 'TAK 5+2',             pts: 4   },
    { id: 'szelfi',   name: 'Szelfi',              pts: 3   },
    { id: 'eco',      name: 'ECO / ONLINE',        pts: 3   },
    { id: 'sima',     name: 'Sima hívás',          pts: 3   },
    { id: 'chat',     name: 'Chat',                pts: 1.5 },
    { id: 'callproc', name: 'CALL PROC',           pts: 1   },
    { id: 'script',   name: 'Script zárás',        pts: 0.5 },
    { id: 'sikdok',   name: 'Sikeres okmány',      pts: 3   },
    { id: 'eldok',    name: 'Elutasított okmány',  pts: 2   },
    { id: 'push',     name: 'Push',                pts: 1   },
    { id: 'bek',      name: 'Bekérés',             pts: 1   },
    { id: 'email',    name: 'Email',               pts: 2   },
  ];
  const COLORS = [
    { key:'red',hex:'#ef4444' },{ key:'orange',hex:'#f97316' },{ key:'yellow',hex:'#eab308' },
    { key:'green',hex:'#22c55e' },{ key:'teal',hex:'#14b8a6' },{ key:'blue',hex:'#3b82f6' },
    { key:'purple',hex:'#a855f7' },{ key:'pink',hex:'#ec4899' },
  ];

  function pgLoadConfig() {
    try {
      const cfg = JSON.parse(localStorage.getItem('pontConfig'));
      if (!Array.isArray(cfg) || !cfg.length) return DEFAULT_CATEGORIES.map(c=>({...c}));
      const ids = cfg.map(c=>c.id);
      const all = [...cfg];
      DEFAULT_CATEGORIES.forEach(d => { if (!ids.includes(d.id)) all.push({...d}); });
      return all.length ? all : DEFAULT_CATEGORIES.map(c=>({...c}));
    } catch(e) { localStorage.removeItem('pontConfig'); return DEFAULT_CATEGORIES.map(c=>({...c})); }
  }
  function pgSaveConfig() {
    localStorage.setItem('pontConfig', JSON.stringify(CATEGORIES.map(c=>({id:c.id,name:c.name,pts:c.pts,color:c.color||null}))));
  }

  let CATEGORIES = pgLoadConfig();
  let pgCounts = {};
  CATEGORIES.forEach(c => pgCounts[c.id] = 0);
  let pgEditMode = false;
  let pgDragSrc = null;

  function pgTodayKey() { return new Date().toISOString().slice(0,10); }
  function pgFmtDate(k) { const [y,m,d]=k.split('-'); return `${y}. ${m}. ${d}.`; }
  function pgTotal(c) { return CATEGORIES.reduce((s,cat)=>s+(c[cat.id]||0)*cat.pts,0); }

  window.pgToggleEdit = function() {
    pgEditMode = !pgEditMode;
    const btn = document.getElementById('editToggleBtn');
    const list = document.getElementById('categoryList');
    btn.textContent = pgEditMode ? '✓ Kész' : '✏️ Szerkesztés';
    btn.classList.toggle('active', pgEditMode);
    list.classList.toggle('edit-mode', pgEditMode);
    if (!pgEditMode) {
      document.querySelectorAll('.pts-input').forEach(inp => {
        const cat = CATEGORIES.find(c=>c.id===inp.dataset.id);
        const v = parseFloat(inp.value);
        if (cat && !isNaN(v) && v>=0) cat.pts = v;
      });
      document.querySelectorAll('.cat-name-input').forEach(inp => {
        const cat = CATEGORIES.find(c=>c.id===inp.dataset.id);
        const v = inp.value.trim();
        if (cat && v) cat.name = v;
      });
      pgSaveConfig(); pgBuildList(); pgUpdateUI();
    }
  };

  function pgBuildList() {
    const el = document.getElementById('categoryList');
    el.innerHTML = '';
    if (pgEditMode) el.classList.add('edit-mode'); else el.classList.remove('edit-mode');
    CATEGORIES.forEach((cat, idx) => {
      const div = document.createElement('div');
      div.className = 'category-item'; div.dataset.idx = idx; div.draggable = true;
      const color = cat.color ? COLORS.find(c=>c.key===cat.color) : null;
      if (color) { div.style.borderColor = color.hex+'60'; div.style.background = color.hex+'10'; }
      const swatches = `<div class="color-swatch none ${!cat.color?'selected':''}" data-color=""></div>` +
        COLORS.map(c=>`<div class="color-swatch ${cat.color===c.key?'selected':''}" data-color="${c.key}" style="background:${c.hex}"></div>`).join('');
      div.innerHTML = `
        <div class="drag-handle">⠿</div>
        <div class="cat-info">
          <span class="cat-name cat-name-static">${cat.name}</span>
          <input class="cat-name-input" type="text" value="${cat.name}" data-id="${cat.id}">
          <div class="cat-pts">${fmt(cat.pts)} pont / db</div>
          <div class="pts-edit-wrap"><span style="font-size:0.72rem;color:var(--text-muted);">Pont:</span>
            <input class="pts-input" type="number" min="0" step="0.5" value="${cat.pts}" data-id="${cat.id}">
          </div>
          <div class="color-palette">${swatches}</div>
        </div>
        <div class="cat-controls">
          <button class="btn-minus" onclick="pgAdjust('${cat.id}',-1)">−</button>
          <div class="cat-count" id="count-${cat.id}">0</div>
          <button class="btn-plus" onclick="pgAdjust('${cat.id}',1)">+</button>
          <div class="cat-earned" id="earned-${cat.id}">0 p</div>
        </div>`;
      div.querySelectorAll('.color-swatch').forEach(sw => {
        sw.addEventListener('click', () => {
          const chosen = sw.dataset.color||null; cat.color = chosen;
          div.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
          sw.classList.add('selected');
          const col = chosen ? COLORS.find(c=>c.key===chosen) : null;
          div.style.borderColor = col ? col.hex+'60' : '';
          div.style.background  = col ? col.hex+'10' : '';
        });
      });
      div.addEventListener('dragstart', e => { pgDragSrc=idx; setTimeout(()=>div.classList.add('dragging'),0); e.dataTransfer.effectAllowed='move'; });
      div.addEventListener('dragend', ()=>div.classList.remove('dragging'));
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave', ()=>div.classList.remove('drag-over'));
      div.addEventListener('drop', e => {
        e.preventDefault(); div.classList.remove('drag-over');
        if (pgDragSrc===null||pgDragSrc===idx) return;
        const moved=CATEGORIES.splice(pgDragSrc,1)[0]; CATEGORIES.splice(idx,0,moved);
        pgDragSrc=null; pgSaveConfig(); pgBuildList(); pgUpdateUI();
      });
      el.appendChild(div);
    });
  }

  function pgUpdateUI() {
    let total=0;
    CATEGORIES.forEach(cat => {
      const c=pgCounts[cat.id]||0, e=c*cat.pts;
      const ce=document.getElementById('count-'+cat.id), ee=document.getElementById('earned-'+cat.id);
      if(ce) ce.textContent=c; if(ee) ee.textContent=fmt(e)+' p';
      total+=e;
    });
    document.getElementById('livePts').textContent=fmt(total);
  }

  window.pgAdjust = function(id,delta) { pgCounts[id]=Math.max(0,(pgCounts[id]||0)+delta); pgUpdateUI(); };

  function pgGetHistory() { return JSON.parse(localStorage.getItem('pontHistory')||'{}'); }
  function pgSaveHistory(h) { localStorage.setItem('pontHistory',JSON.stringify(h)); }

  window.pgOnDateChange = function() {
    const key = document.getElementById('saveDate').value || pgTodayKey();
    const h = pgGetHistory();
    if (h[key]) pgCounts={...h[key]}; else CATEGORIES.forEach(c=>pgCounts[c.id]=0);
    pgUpdateUI();
  };

  function pgLoadToday() {
    const key = pgTodayKey();
    document.getElementById('saveDate').value = key;
    const h = pgGetHistory();
    if (h[key]) pgCounts={...h[key]}; else CATEGORIES.forEach(c=>pgCounts[c.id]=0);
    pgUpdateUI();
  }

  window.pgSaveDay = function() {
    const key = document.getElementById('saveDate').value || pgTodayKey();
    const h = pgGetHistory(); h[key]={...pgCounts};
    pgSaveHistory(h); showToast('Mentve! ✓'); pgUpdateSummary(); pgUpdateHistory();
  };

  window.pgCalcRange = function() {
    const from=document.getElementById('rangeFrom').value, to=document.getElementById('rangeTo').value;
    if (!from||!to||from>to){alert('Adj meg érvényes időszakot!');return;}
    const h=pgGetHistory(), today=pgTodayKey();
    let total=0,dayCount=0; const catTotals={};
    const cur=new Date(from), end=new Date(to);
    while(cur<=end){
      const k=cur.toISOString().slice(0,10);
      const dc=k===today?pgCounts:(h[k]||null);
      if(dc){dayCount++;CATEGORIES.forEach(cat=>{const c=dc[cat.id]||0;if(c>0){catTotals[cat.id]=(catTotals[cat.id]||0)+c;total+=c*cat.pts;}});}
      cur.setDate(cur.getDate()+1);
    }
    document.getElementById('drTotal').textContent=fmt(total)+' pont';
    document.getElementById('drDays').textContent=dayCount+' nap adata';
    const bd=document.getElementById('drBreakdown'); bd.innerHTML='';
    CATEGORIES.forEach(cat=>{const c=catTotals[cat.id]||0;if(c>0){const r=document.createElement('div');r.className='history-row';r.innerHTML=`<span>${cat.name} × ${c}</span><span>${fmt(c*cat.pts)} p</span>`;bd.appendChild(r);}});
    if(!Object.keys(catTotals).length) bd.innerHTML='<div class="empty">Nincs adat ebben az időszakban.</div>';
    document.getElementById('drResult').style.display='block';
  };

  function pgUpdateSummary() {
    const h=pgGetHistory(), today=pgTodayKey(), todayTotal=pgTotal(pgCounts);
    document.getElementById('s-today').textContent=fmt(todayTotal);
    const now=new Date(), dow=now.getDay()===0?6:now.getDay()-1;
    let wt=0;
    for(let i=0;i<=dow;i++){const d=new Date(now);d.setDate(now.getDate()-i);const k=d.toISOString().slice(0,10);wt+=k===today?todayTotal:(h[k]?pgTotal(h[k]):0);}
    document.getElementById('s-week').textContent=fmt(wt);
    const ym=today.slice(0,7); let mt=todayTotal;
    Object.keys(h).forEach(k=>{if(k.startsWith(ym)&&k!==today)mt+=pgTotal(h[k]);});
    document.getElementById('s-month').textContent=fmt(mt);
    const bd=document.getElementById('todayBreakdown'); bd.innerHTML='';
    let any=false;
    CATEGORIES.forEach(cat=>{const c=pgCounts[cat.id]||0;if(c>0){any=true;const r=document.createElement('div');r.className='history-row';r.innerHTML=`<span>${cat.name} × ${c}</span><span>${fmt(c*cat.pts)} p</span>`;bd.appendChild(r);}});
    if(!any) bd.innerHTML='<div class="empty">Még nincs mai adat.</div>';
  }

  function pgUpdateHistory() {
    const h=pgGetHistory(), el=document.getElementById('historyList'); el.innerHTML='';
    const keys=Object.keys(h).sort().reverse();
    if(!keys.length){el.innerHTML='<div class="empty">Még nincs mentett nap.</div>';return;}
    keys.forEach(key=>{
      const dc=h[key], total=pgTotal(dc);
      const div=document.createElement('div'); div.className='history-day';
      const body=document.createElement('div'); body.className='history-day-body';
      CATEGORIES.forEach(cat=>{const c=dc[cat.id]||0;if(c>0){const r=document.createElement('div');r.className='history-row';r.innerHTML=`<span>${cat.name} × ${c}</span><span>${fmt(c*cat.pts)} p</span>`;body.appendChild(r);}});
      const hdr=document.createElement('div'); hdr.className='history-day-header';
      hdr.innerHTML=`<span class="hd-date">${pgFmtDate(key)}</span><span class="hd-total">${fmt(total)} pont</span>`;
      hdr.onclick=()=>body.classList.toggle('open');
      div.appendChild(hdr); div.appendChild(body); el.appendChild(div);
    });
  }

  window.pgClearAll = function() {
    if(!confirm('Biztosan törlöd az összes adatot?')) return;
    localStorage.removeItem('pontHistory');
    CATEGORIES.forEach(c=>pgCounts[c.id]=0);
    pgUpdateUI(); pgUpdateSummary(); pgUpdateHistory();
  };

  window.pgShowTab = function(id, tabEl) {
    document.querySelectorAll('.pg-page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.pg-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('pg-'+id).classList.add('active');
    tabEl.classList.add('active');
    if(id==='osszesito'){
      pgUpdateSummary();
      const t=pgTodayKey();
      if(!document.getElementById('rangeFrom').value){document.getElementById('rangeFrom').value=t.slice(0,7)+'-01';document.getElementById('rangeTo').value=t;}
    }
    if(id==='elozmenyek') pgUpdateHistory();
  };

  document.getElementById('pg-today-date').textContent = new Date().toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric'});
  pgBuildList();
  pgLoadToday();
}

// ══════════════════════════════════════════
// KALKULÁTOR
// ══════════════════════════════════════════
{
  const LS = 'etup_kalkulator';
  let pkBuiltDays = 0, pkLoading = false, pkSettingsOpen = true;

  const PK_DEFAULT_CATS = [
    {id:'4ec',pts:2},{id:'notak52',pts:2},{id:'tak52',pts:4},{id:'szelfi',pts:3},
    {id:'eco',pts:3},{id:'sima',pts:3},{id:'chat',pts:1.5},{id:'callproc',pts:1},
    {id:'script',pts:0.5},{id:'sikdok',pts:3},{id:'eldok',pts:2},{id:'push',pts:1},
    {id:'bek',pts:1},{id:'email',pts:2},
  ];

  function pkGetCats() {
    try { const c=JSON.parse(localStorage.getItem('pontConfig')); if(Array.isArray(c)&&c.length) return c; } catch(e){}
    return PK_DEFAULT_CATS;
  }
  function pkDayTotal(dc) {
    if(!dc) return null;
    let t=0; pkGetCats().forEach(c=>t+=(dc[c.id]||0)*c.pts); return t;
  }

  function pkSyncDay(i) {
    const di=document.getElementById('pk-date-'+i), pi=document.getElementById('pk-day-'+i);
    if(!di||!pi||!di.value) return;
    try {
      const h=JSON.parse(localStorage.getItem('pontHistory')||'{}');
      const t=pkDayTotal(h[di.value]);
      pi.value=(t!==null&&t>0)?t:'';
    } catch(e){pi.value='';}
    pkRecalc();
  }

  function pkSyncAll() { for(let i=1;i<=pkBuiltDays;i++) pkSyncDay(i); }

  function pkSave() {
    if(pkLoading) return;
    const days=pkGetDays(), dates=[];
    for(let i=1;i<=days;i++){const d=document.getElementById('pk-date-'+i);dates.push(d?d.value:'');}
    localStorage.setItem(LS,JSON.stringify({
      days, elapsed:pkGetElapsed(),
      r80:parseFloat(document.getElementById('rate-80').value),
      r100:parseFloat(document.getElementById('rate-100').value),
      r120:parseFloat(document.getElementById('rate-120').value),
      points:pkGetPoints(days), dates,
    }));
  }

  function pkLoad() {
    pkLoading=true;
    try {
      const s=JSON.parse(localStorage.getItem(LS));
      if(s){
        document.getElementById('etup-days').value=s.days||7;
        document.getElementById('elapsed-days').value=s.elapsed||1;
        document.getElementById('rate-80').value=s.r80||103;
        document.getElementById('rate-100').value=s.r100||130;
        document.getElementById('rate-120').value=s.r120||156;
        pkRebuildDays();
        (s.dates||[]).forEach((d,i)=>{const el=document.getElementById('pk-date-'+(i+1));if(el&&d)el.value=d;});
        (s.points||[]).forEach((p,i)=>{const el=document.getElementById('pk-day-'+(i+1));if(el&&p>0)el.value=p;});
        pkSyncAll();
      } else { pkRebuildDays(); }
    } catch(e){pkRebuildDays();}
    pkLoading=false; pkRecalc();
  }

  window.pkReset = function() {
    if(!confirm('Biztosan törölsz minden napi pontot? (A beállítások megmaradnak.)')) return;
    const days=pkGetDays();
    for(let i=1;i<=days;i++){
      const pi=document.getElementById('pk-day-'+i), di=document.getElementById('pk-date-'+i);
      if(pi) pi.value=''; if(di) di.value='';
    }
    document.getElementById('elapsed-days').value=1;
    pkSave(); pkRecalc();
  };

  window.pkToggleSettings = function() {
    pkSettingsOpen=!pkSettingsOpen;
    document.getElementById('pk-settings').style.display=pkSettingsOpen?'block':'none';
    document.getElementById('pk-chevron').textContent=pkSettingsOpen?'▾':'▸';
  };

  function pkGetDays()    { return Math.max(1,parseInt(document.getElementById('etup-days').value)||7); }
  function pkGetElapsed() { return Math.max(1,parseInt(document.getElementById('elapsed-days').value)||1); }
  function pkGetRates()   { return { r80:parseFloat(document.getElementById('rate-80').value)||103, r100:parseFloat(document.getElementById('rate-100').value)||130, r120:parseFloat(document.getElementById('rate-120').value)||156 }; }
  function pkGetPoints(days) { const pts=[]; for(let i=1;i<=days;i++){const el=document.getElementById('pk-day-'+i);pts.push(el?(parseFloat(el.value)||0):0);} return pts; }

  window.pkRebuildDays = function() {
    const days=pkGetDays(), el=document.getElementById('elapsed-days');
    el.max=days; if(parseInt(el.value)>days) el.value=days;
    const list=document.getElementById('pk-days-list');
    if(days<pkBuiltDays){for(let i=days+1;i<=pkBuiltDays;i++){const r=document.getElementById('pk-row-'+i);if(r)r.remove();}}
    else if(days>pkBuiltDays){
      for(let i=pkBuiltDays+1;i<=days;i++){
        const row=document.createElement('div'); row.className='day-row'; row.id='pk-row-'+i;
        row.innerHTML=`<span class="day-label">${i}. nap</span>
          <input type="date" class="day-date" id="pk-date-${i}" oninput="pkSyncDay(${i});pkSave();">
          <input type="number" class="day-num" id="pk-day-${i}" min="0" step="0.5" placeholder="0" oninput="pkRecalc()">
          <div class="bar-bg" id="pk-bar-bg-${i}"><div class="bar-fill" id="pk-bar-${i}" style="width:0%"></div></div>
          <span class="day-pt" id="pk-pt-${i}">—</span>`;
        list.appendChild(row);
      }
    }
    pkBuiltDays=days; pkRecalc(); pkSave();
  };

  function pkPctColor(pct) {
    if(pct>=120) return '#ea580c';
    if(pct>=100) return '#0d9488';
    if(pct>=80)  return '#65a30d';
    return '#818cf8';
  }

  window.pkRecalc = function() {
    const days=pkGetDays(), elapsed=pkGetElapsed(), {r80,r100,r120}=pkGetRates();
    const t80f=days*r80,t100f=days*r100,t120f=days*r120;
    const t80e=elapsed*r80,t100e=elapsed*r100,t120e=elapsed*r120;
    document.getElementById('pk-target-info').textContent='Teljes etup → 80%: '+fmt(t80f)+' pt  |  100%: '+fmt(t100f)+' pt  |  120%: '+fmt(t120f)+' pt';
    const points=pkGetPoints(days), total=points.reduce((a,b)=>a+b,0);
    const pct=t100e>0?(total/t100e*100):0;
    const m100=Math.max(0,t100e-total), m80=Math.max(0,t80e-total);
    const col=pkPctColor(pct);
    document.getElementById('pk-summary-cards').innerHTML=`
      <div class="metric-card"><div class="metric-label">Összes pont</div><div class="metric-value" style="color:var(--accent)">${fmt(total)}</div><div class="metric-sub">${elapsed} nap</div></div>
      <div class="metric-card"><div class="metric-label">Teljesítmény</div><div class="metric-value" style="color:${col}">${pct.toFixed(1)}%</div><div class="metric-sub">${elapsed} napra</div></div>
      <div class="metric-card"><div class="metric-label">Hiány 100%</div><div class="metric-value" style="color:var(--accent)">${m100>0?fmt(m100):'✓'}</div><div class="metric-sub">${m100>0?'pont':'Teljesítve'}</div></div>
      <div class="metric-card"><div class="metric-label">Hiány 80%</div><div class="metric-value" style="color:var(--accent)">${m80>0?fmt(m80):'✓'}</div><div class="metric-sub">${m80>0?'pont':'Teljesítve'}</div></div>`;
    for(let i=1;i<=days;i++){
      const p=points[i-1], bw=Math.min(100,p>0?(p/r120)*100:0);
      const bc=p>=r120?'#ea580c':p>=r100?'#0d9488':p>=r80?'#65a30d':'#818cf8';
      const be=document.getElementById('pk-bar-'+i), pe=document.getElementById('pk-pt-'+i);
      if(be){be.style.width=bw+'%';be.style.background=bc;}
      if(pe) pe.textContent=p>0?fmt(p)+' pt':'—';
    }
    const pos80=(80/130)*100, pos100=(100/130)*100, pos120=(120/130)*100, fillW=Math.min(pct/130*100,100);
    document.getElementById('pk-gauge').innerHTML=`
      <div style="text-align:center;margin-bottom:20px;">
        <div class="gauge-pct" style="color:${col}">${pct.toFixed(1)}%</div>
        <div class="gauge-sub">${fmt(total)} pont · ${elapsed}. nap</div>
      </div>
      <div style="position:relative;margin:0 8px 36px;">
        <div style="height:16px;background:var(--bar-bg);border-radius:8px;overflow:hidden;">
          <div style="height:100%;width:${fillW}%;background:${col};border-radius:8px;transition:width 0.4s;"></div>
        </div>
        <div style="position:absolute;left:${pos80}%;top:0;transform:translateX(-50%);">
          <div style="width:2px;height:16px;background:var(--bg);margin:0 auto;"></div>
          <div style="font-size:10px;font-weight:600;color:#65a30d;text-align:center;margin-top:6px;white-space:nowrap;">80%<br><span style="font-weight:400;color:var(--text-muted)">${fmt(t80e)} pt</span></div>
        </div>
        <div style="position:absolute;left:${pos100}%;top:0;transform:translateX(-50%);">
          <div style="width:2px;height:16px;background:var(--bg);margin:0 auto;"></div>
          <div style="font-size:10px;font-weight:600;color:#0d9488;text-align:center;margin-top:6px;white-space:nowrap;">100%<br><span style="font-weight:400;color:var(--text-muted)">${fmt(t100e)} pt</span></div>
        </div>
        <div style="position:absolute;left:${pos120}%;top:0;transform:translateX(-50%);">
          <div style="width:2px;height:16px;background:var(--bg);margin:0 auto;"></div>
          <div style="font-size:10px;font-weight:600;color:#ea580c;text-align:center;margin-top:6px;white-space:nowrap;">120%<br><span style="font-weight:400;color:var(--text-muted)">${fmt(t120e)} pt</span></div>
        </div>
      </div>`;
    pkSave();
  };

  pkLoad();
}
</script>
</body>
</html>
