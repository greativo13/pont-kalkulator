<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VB App</title>
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #71717a;
      --accent: #818cf8;
      --accent-dim: #818cf820;
      --radius: 10px;
    }
    [data-theme="soft"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #818cf8;
      --accent-dim: #818cf818;
    }
    [data-theme="light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-dim: #6366f112;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .nav {
      display: flex;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      flex-shrink: 0;
      height: 52px;
      gap: 4px;
    }
    .nav-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 12px;
      white-space: nowrap;
    }
    .nav-tabs { display: flex; gap: 4px; flex: 1; }
    .nav-tab {
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .nav-tab:hover { background: var(--accent-dim); color: var(--text); }
    .nav-tab.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

    .theme-toggle {
      margin-left: auto;
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    .frame-wrap { flex: 1; display: none; overflow: hidden; }
    .frame-wrap.active { display: flex; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
<div class="nav">
  <span class="nav-title">VB</span>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="show('pontosszeado', this)">⭐ Pontgyűjtő</div>
    <div class="nav-tab" onclick="show('kalkulator', this)">📊 Kalkulátor</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Téma váltás">🌙</button>
</div>

<div class="frame-wrap active" id="frame-pontosszeado">
  <iframe src="pontosszeado.html" id="iframe-pontosszeado"></iframe>
</div>
<div class="frame-wrap" id="frame-kalkulator">
  <iframe src="pont_kalkulator.html" id="iframe-kalkulator" loading="lazy"></iframe>
</div>

<script>
  const ch = new BroadcastChannel('vb-theme');
  let theme = localStorage.getItem('vb-theme') || 'dark';

  const THEMES = ['dark', 'soft', 'light'];
  const THEME_ICONS = { dark: '🌑', soft: '🌓', light: '☀️' };

  function applyTheme(t) {
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeBtn').textContent = THEME_ICONS[t] || '🌓';
    localStorage.setItem('vb-theme', t);
  }

  function toggleTheme() {
    const idx = THEMES.indexOf(theme);
    const next = THEMES[(idx + 1) % THEMES.length];
    applyTheme(next);
    ch.postMessage({ theme: next });
  }

  function show(id, tab) {
    document.querySelectorAll('.frame-wrap').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('frame-' + id).classList.add('active');
    tab.classList.add('active');
  }

  applyTheme(theme);
</script>
</body>
</html>
